<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Commerce tizimiga kirish">
    <title>Kirish | E-Commerce</title>
    <link rel="stylesheet" href="../styles/loginPage.css">
</head>
<body>
    <main class="login-wrapper">
        <div class="scene">
            <div class="cube">
                <span class="cube__face cube__face--front"></span>
                <span class="cube__face cube__face--back"></span>
                <span class="cube__face cube__face--right"></span>
                <span class="cube__face cube__face--left"></span>
                <span class="cube__face cube__face--top"></span>
                <span class="cube__face cube__face--bottom"></span>
            </div>
        </div>

        <div class="shapes">
            <div class="shape shape--1"></div>
            <div class="shape shape--2"></div>
            <div class="shape shape--3"></div>
            <div class="shape shape--4"></div>
            <div class="shape shape--5"></div>
        </div>

        <div class="card-container">
            <article class="login-card" id="loginCard">
                <div class="card-flipper">
                    <section class="card-face card-face--signin">
                        <header class="login-card__header">
                            <figure class="login-card__logo">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                                    <line x1="3" y1="6" x2="21" y2="6"/>
                                    <path d="M16 10a4 4 0 0 1-8 0"/>
                                </svg>
                            </figure>
                            <h1 class="login-card__title">Xush kelibsiz</h1>
                            <p class="login-card__subtitle">Akkauntingizga kiring</p>
                        </header>

                        <form class="login-form" data-form="signin" action="#" method="POST" novalidate>
                            <div class="form-group">
                                <label for="signin-email" class="form-label">Email</label>
                                <div class="input-wrapper">
                                    <input 
                                        type="email" 
                                        id="signin-email" 
                                        name="email" 
                                        class="form-input" 
                                        placeholder="email@example.com"
                                        required
                                        autocomplete="email"
                                    >
                                    <span class="input-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                            <polyline points="22,6 12,13 2,6"/>
                                        </svg>
                                    </span>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="signin-password" class="form-label">Parol</label>
                                <div class="input-wrapper">
                                    <input 
                                        type="password" 
                                        id="signin-password" 
                                        name="password" 
                                        class="form-input" 
                                        placeholder="••••••••"
                                        required
                                        autocomplete="current-password"
                                    >
                                    <button type="button" class="toggle-password" aria-label="Parolni ko'rsatish">
                                        <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                            <circle cx="12" cy="12" r="3"/>
                                        </svg>
                                        <svg class="eye-closed hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                            <line x1="1" y1="1" x2="23" y2="23"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <div class="form-row">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" name="remember" class="checkbox-input">
                                    <span class="checkbox-custom"></span>
                                    <span class="checkbox-label">Eslab qol</span>
                                </label>
                                <a href="#" class="forgot-link">Parolni unutdingizmi?</a>
                            </div>

                            <button type="submit" class="submit-btn">
                                <span class="submit-btn__text">Kirish</span>
                                <span class="submit-btn__icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="5" y1="12" x2="19" y2="12"/>
                                        <polyline points="12 5 19 12 12 19"/>
                                    </svg>
                                </span>
                            </button>
                        </form>

                        <footer class="login-card__footer">
                            <p class="switch-text">
                                Akkountingiz yo'qmi? 
                                <button type="button" class="switch-btn" data-target="signup">Ro'yxatdan o'ting</button>
                            </p>
                        </footer>
                    </section>

                    <section class="card-face card-face--signup">
                        <header class="login-card__header">
                            <figure class="login-card__logo">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                                    <line x1="3" y1="6" x2="21" y2="6"/>
                                    <path d="M16 10a4 4 0 0 1-8 0"/>
                                </svg>
                            </figure>
                            <h1 class="login-card__title">Akkount yarating</h1>
                            <p class="login-card__subtitle">Bepul ro'yxatdan o'ting</p>
                        </header>

                        <form class="login-form" data-form="signup" action="#" method="POST" novalidate>
                            <div class="form-group">
                                <label for="signup-name" class="form-label">To'liq ismingiz</label>
                                <div class="input-wrapper">
                                    <input 
                                        type="text" 
                                        id="signup-name" 
                                        name="name" 
                                        class="form-input" 
                                        placeholder="Ali Valiyev"
                                        required
                                        autocomplete="name"
                                    >
                                    <span class="input-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                            <circle cx="12" cy="7" r="4"/>
                                        </svg>
                                    </span>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="signup-email" class="form-label">Email</label>
                                <div class="input-wrapper">
                                    <input 
                                        type="email" 
                                        id="signup-email" 
                                        name="email" 
                                        class="form-input" 
                                        placeholder="email@example.com"
                                        required
                                        autocomplete="email"
                                    >
                                    <span class="input-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                            <polyline points="22,6 12,13 2,6"/>
                                        </svg>
                                    </span>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="signup-password" class="form-label">Parol</label>
                                <div class="input-wrapper">
                                    <input 
                                        type="password" 
                                        id="signup-password" 
                                        name="password" 
                                        class="form-input" 
                                        placeholder="Min 8 belgi"
                                        required
                                        autocomplete="new-password"
                                        minlength="8"
                                    >
                                    <button type="button" class="toggle-password" aria-label="Parolni ko'rsatish">
                                        <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                            <circle cx="12" cy="12" r="3"/>
                                        </svg>
                                        <svg class="eye-closed hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                            <line x1="1" y1="1" x2="23" y2="23"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <label class="checkbox-wrapper">
                                <input type="checkbox" name="terms" class="checkbox-input" required>
                                <span class="checkbox-custom"></span>
                                <span class="checkbox-label">
                                    <a href="#" class="terms-link">Foydalanish shartlari</a> bilan roziman
                                </span>
                            </label>

                            <button type="submit" class="submit-btn submit-btn--signup">
                                <span class="submit-btn__text">Ro'yxatdan o'tish</span>
                                <span class="submit-btn__icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                        <circle cx="8.5" cy="7" r="4"/>
                                        <line x1="20" y1="8" x2="20" y2="14"/>
                                        <line x1="23" y1="11" x2="17" y2="11"/>
                                    </svg>
                                </span>
                            </button>
                        </form>

                        <footer class="login-card__footer">
                            <p class="switch-text">
                                Akkountingiz bormi? 
                                <button type="button" class="switch-btn" data-target="signin">Kirish</button>
                            </p>
                        </footer>
                    </section>
                </div>

                <div class="progress-indicator">
                    <button class="progress-dot active" data-form="signin" aria-label="Sign In"></button>
                    <button class="progress-dot" data-form="signup" aria-label="Sign Up"></button>
                </div>
            </article>
        </div>
    </main>

    <script src="../scripts/loginPage.js"></script>
</body>
</html>
